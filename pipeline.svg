<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 320" class="pipeline-diagram">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#888"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect x="20" y="20" width="960" height="280" fill="rgba(255,255,255,0.02)" rx="8" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

  <!-- ROW 1: Engines -->
  <rect x="200" y="45" width="150" height="30" fill="rgba(230,184,0,0.15)" rx="6" stroke="rgba(230,184,0,0.4)"/>
  <text x="275" y="65" text-anchor="middle" font-size="11" font-family="sans-serif" fill="#c9b84a">Parametric Modeling Engine</text>
  <rect x="500" y="45" width="140" height="30" fill="rgba(230,184,0,0.15)" rx="6" stroke="rgba(230,184,0,0.4)"/>
  <text x="570" y="65" text-anchor="middle" font-size="11" font-family="sans-serif" fill="#c9b84a">G-Code Translation Engine</text>

  <!-- ROW 2: Main flow - Inputs to Design -->
  <rect x="40" y="100" width="110" height="40" fill="#1a1a1a" rx="6" stroke="rgba(255,255,255,0.08)" filter="url(#shadow)"/>
  <text x="95" y="125" text-anchor="middle" font-size="11" font-family="sans-serif" fill="#fff">Body Measurements</text>

  <rect x="190" y="100" width="120" height="40" fill="#252525" rx="6" stroke="rgba(255,255,255,0.06)"/>
  <text x="250" y="125" text-anchor="middle" font-size="11" font-family="sans-serif" fill="#e8e8e8">Base Body Geometry</text>

  <rect x="350" y="100" width="110" height="40" fill="#252525" rx="6" stroke="rgba(255,255,255,0.06)"/>
  <text x="405" y="125" text-anchor="middle" font-size="11" font-family="sans-serif" fill="#e8e8e8">Garment Iterations</text>

  <rect x="500" y="100" width="130" height="40" fill="#252525" rx="6" stroke="rgba(255,255,255,0.06)"/>
  <text x="565" y="125" text-anchor="middle" font-size="11" font-family="sans-serif" fill="#e8e8e8">Fabrication Ready File</text>

  <!-- ROW 3: Natural language flow -->
  <rect x="40" y="170" width="110" height="40" fill="#1a1a1a" rx="6" stroke="rgba(255,255,255,0.08)" filter="url(#shadow)"/>
  <text x="95" y="195" text-anchor="middle" font-size="10" font-family="sans-serif" fill="#fff">Natural Language Input</text>

  <rect x="190" y="170" width="80" height="40" fill="#2a2a2a" rx="6" stroke="rgba(255,255,255,0.05)"/>
  <text x="230" y="195" text-anchor="middle" font-size="11" font-family="sans-serif" fill="#ddd">Text</text>

  <rect x="310" y="170" width="80" height="40" fill="#2a2a2a" rx="6" stroke="rgba(255,255,255,0.05)"/>
  <text x="350" y="195" text-anchor="middle" font-size="11" font-family="sans-serif" fill="#ddd">Data Types</text>

  <rect x="430" y="170" width="80" height="40" fill="#2a2a2a" rx="6" stroke="rgba(255,255,255,0.05)"/>
  <text x="470" y="195" text-anchor="middle" font-size="11" font-family="sans-serif" fill="#ddd">Data Pulls</text>

  <rect x="550" y="170" width="130" height="40" fill="#2a2a2a" rx="6" stroke="rgba(255,255,255,0.05)"/>
  <text x="615" y="195" text-anchor="middle" font-size="10" font-family="sans-serif" fill="#ddd">Weighted &amp; Calculated Data</text>

  <rect x="720" y="170" width="110" height="40" fill="#2a2a2a" rx="6" stroke="rgba(255,255,255,0.05)"/>
  <text x="775" y="195" text-anchor="middle" font-size="11" font-family="sans-serif" fill="#ddd">Baseline Parameters</text>

  <!-- ROW 4: Tools -->
  <rect x="190" y="240" width="85" height="32" fill="rgba(45,125,70,0.4)" rx="4" stroke="rgba(45,125,70,0.6)"/>
  <text x="232" y="260" text-anchor="middle" font-size="10" font-family="sans-serif" fill="#8fcc9f">Voice to Text</text>
  <rect x="305" y="240" width="90" height="32" fill="rgba(44,90,160,0.4)" rx="4" stroke="rgba(44,90,160,0.6)"/>
  <text x="350" y="260" text-anchor="middle" font-size="10" font-family="sans-serif" fill="#8ab4e8">LLM Processing</text>
  <rect x="425" y="240" width="100" height="32" fill="rgba(44,90,160,0.4)" rx="4" stroke="rgba(44,90,160,0.6)"/>
  <text x="475" y="260" text-anchor="middle" font-size="10" font-family="sans-serif" fill="#8ab4e8">Data Processing</text>
  <rect x="550" y="240" width="180" height="32" fill="#1a1a1a" rx="4" stroke="rgba(255,255,255,0.06)"/>
  <text x="640" y="260" text-anchor="middle" font-size="10" font-family="sans-serif" fill="#aaa">Real World Garment Knowledge</text>

  <!-- ROW 5: Output -->
  <rect x="680" y="100" width="90" height="40" fill="#1a1a1a" rx="6" stroke="rgba(255,255,255,0.08)"/>
  <text x="725" y="125" text-anchor="middle" font-size="11" font-family="sans-serif" fill="#fff">Filament Material</text>
  <rect x="810" y="100" width="100" height="40" fill="#1a1a1a" rx="6" stroke="rgba(255,255,255,0.08)"/>
  <text x="860" y="125" text-anchor="middle" font-size="11" font-family="sans-serif" fill="#fff">3D Printing</text>
  <rect x="810" y="170" width="100" height="40" fill="#1a1a1a" rx="6" stroke="rgba(255,255,255,0.08)"/>
  <text x="860" y="195" text-anchor="middle" font-size="11" font-family="sans-serif" fill="#fff">Physical Garment</text>
  <rect x="810" y="240" width="100" height="32" fill="#1a1a1a" rx="4" stroke="rgba(255,255,255,0.06)"/>
  <text x="860" y="260" text-anchor="middle" font-size="10" font-family="sans-serif" fill="#fff">Recycled Filament</text>

  <!-- Arrows: Main flow -->
  <path d="M 150 120 L 190 120" stroke="#555" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <path d="M 310 120 L 350 120" stroke="#555" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <path d="M 460 120 L 500 120" stroke="#555" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <path d="M 630 120 L 680 120" stroke="#555" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <path d="M 770 120 L 810 120" stroke="#555" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- Arrows: Natural language flow -->
  <path d="M 150 190 L 190 190" stroke="#555" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <path d="M 270 190 L 310 190" stroke="#555" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <path d="M 390 190 L 430 190" stroke="#555" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <path d="M 510 190 L 550 190" stroke="#555" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <path d="M 680 190 L 720 190" stroke="#555" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- Arrows: Params to Design -->
  <path d="M 775 190 L 775 140 L 405 140 L 405 120" stroke="#555" stroke-width="1.2" fill="none" stroke-dasharray="3 2" marker-end="url(#arrow)"/>
  <path d="M 775 190 L 775 140 L 250 140 L 250 120" stroke="#555" stroke-width="1.2" fill="none" stroke-dasharray="3 2" marker-end="url(#arrow)"/>

  <!-- Arrows: Body Measurements to Base Body -->
  <path d="M 95 140 L 95 170 L 250 170 L 250 140" stroke="#555" stroke-width="1.2" fill="none" stroke-dasharray="3 2" marker-end="url(#arrow)"/>

  <!-- Arrows: Engines to flow -->
  <path d="M 275 75 L 275 100" stroke="rgba(201,184,74,0.6)" stroke-width="1" fill="none" marker-end="url(#arrow)"/>
  <path d="M 570 75 L 565 100" stroke="rgba(201,184,74,0.6)" stroke-width="1" fill="none" marker-end="url(#arrow)"/>

  <!-- Arrows: Tools to data -->
  <path d="M 232 240 L 232 210" stroke="rgba(143,204,159,0.5)" stroke-width="1" fill="none"/>
  <path d="M 350 240 L 350 210" stroke="rgba(138,180,232,0.5)" stroke-width="1" fill="none"/>
  <path d="M 475 240 L 470 210" stroke="rgba(138,180,232,0.5)" stroke-width="1" fill="none"/>

  <!-- Arrows: 3D Printing to outputs -->
  <path d="M 860 140 L 860 170" stroke="#555" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <path d="M 860 140 L 860 256" stroke="#555" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
</svg>
